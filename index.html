<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приглашение: Николай и Анастасия</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Infant:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@200;300&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { margin: 0; padding: 0; background-color: #F9F6F0; scroll-behavior: smooth; }
        .font-serif { font-family: 'Cormorant Infant', serif; }
        .font-sans { font-family: 'Montserrat', sans-serif; }
        /* Градиент поверх фото для читаемости текста */
        .hero-overlay {
            background: linear-gradient(to bottom, rgba(249, 246, 240, 0.1) 0%, rgba(249, 246, 240, 0.3) 60%, rgba(249, 246, 240, 1) 100%);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { motion } = window.Motion;

        const CalendarSection = () => {
            const days = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];
            const dates = Array.from({ length: 30 }, (_, i) => i + 1);
            const weddingDay = 20;

            return (
                <section className="py-32 px-6 bg-[#F9F6F0] flex flex-col items-center">
                    <motion.div 
                        initial={{ opacity: 0, y: 30 }}
                        whileInView={{ opacity: 1, y: 0 }}
                        viewport={{ once: true }}
                        transition={{ duration: 1.2 }}
                        className="max-w-md w-full text-center"
                    >
                        <h2 className="font-serif text-5xl text-[#2C2C2C] mb-4">Июнь 2026</h2>
                        <div className="w-12 h-[1px] bg-[#8C7E6A] mx-auto mb-16 opacity-30" />
                        
                        <div className="grid grid-cols-7 gap-y-8 text-[11px] font-sans tracking-[0.2em] text-[#8C7E6A] mb-12">
                            {days.map(day => <div key={day} className="font-light uppercase">{day}</div>)}
                            {dates.map(date => (
                                <div key={date} className="relative flex items-center justify-center h-10">
                                    {date === weddingDay && (
                                        <motion.div 
                                            initial={{ scale: 0 }}
                                            whileInView={{ scale: 1 }}
                                            className="absolute w-12 h-12 border border-[#8C7E6A]/40 rounded-full"
                                        />
                                    )}
                                    <span className={`text-lg ${date === weddingDay ? 'text-[#1A1A1A] font-normal' : 'text-[#A0A0A0] font-light'}`}>
                                        {date}
                                    </span>
                                </div>
                            ))}
                        </div>
                        
                        <p className="font-serif italic text-[#8C7E6A] text-xl">Суббота, день нашей свадьбы</p>
                    </motion.div>
                </section>
            );
        };

        function App() {
            // ID вашего файла из Google Drive
            const fileId = "1UKkIjvRcpwiEMMLd2YnqPMmFhbKUNVy_";
            // Прямая ссылка для вставки в тег img
            const directLink = `https://lh3.googleusercontent.com/d/${fileId}`;

            return (
                <div className="min-h-screen">
                    {/* HERO SECTION */}
                    <section className="relative h-screen w-full flex items-center justify-center overflow-hidden">
                        <motion.div 
                            initial={{ scale: 1.1 }}
                            animate={{ scale: 1 }}
                            transition={{ duration: 10, ease: "easeOut" }}
                            className="absolute inset-0 z-0"
                        >
                            <div className="absolute inset-0 z-10 hero-overlay" />
                            <img 
                                src={directLink} 
                                alt="Николай и Анастасия" 
                                className="h-full w-full object-cover shadow-2xl"
                                onError={(e) => {
                                    // Резервное фото на случай, если Google Drive заблокирует запрос
                                    e.target.src = "https://images.unsplash.com/photo-1511795409834-ef04bbd61622?q=80&w=2000";
                                }}
                            />
                        </motion.div>

                        <motion.div 
                            initial="hidden"
                            animate="visible"
                            variants={{ visible: { transition: { staggerChildren: 0.5 } } }}
                            className="relative z-20 text-center px-6"
                        >
                            <motion.p variants={{ hidden: { opacity: 0 }, visible: { opacity: 1 } }} 
                                className="font-sans uppercase tracking-[0.6em] text-[10px] md:text-xs text-[#6B5E4C] mb-12">
                                Приглашение на свадьбу
                            </motion.p>

                            <div className="flex flex-col items-center mb-12">
                                <motion.h1 variants={{ hidden: { opacity: 0, y: 20 }, visible: { opacity: 1, y: 0 } }} 
                                    className="font-serif text-6xl md:text-9xl text-[#1A1A1A] font-light">Николай</motion.h1>
                                <motion.div variants={{ hidden: { opacity: 0 }, visible: { opacity: 1 } }} className="my-4">
                                    <span className="font-serif text-3xl md:text-5xl italic text-[#8C7E6A]">и</span>
                                </motion.div>
                                <motion.h1 variants={{ hidden: { opacity: 0, y: 20 }, visible: { opacity: 1, y: 0 } }} 
                                    className="font-serif text-6xl md:text-9xl text-[#1A1A1A] font-light">Анастасия</motion.h1>
                            </div>

                            <motion.div variants={{ hidden: { opacity: 0 }, visible: { opacity: 1 } }} className="flex flex-col items-center">
                                <div className="w-20 h-[1px] bg-[#8C7E6A] mb-8 opacity-40" />
                                <p className="font-sans text-[#2D2D2D] text-xl md:text-3xl tracking-[0.4em] font-extralight uppercase">20.06.2026</p>
                            </motion.div>
                        </motion.div>

                        <motion.div 
                            animate={{ y: [0, 10, 0] }}
                            transition={{ repeat: Infinity, duration: 2 }}
                            className="absolute bottom-10 left-1/2 -translate-x-1/2 z-20 opacity-40"
                        >
                            <div className="w-[1px] h-16 bg-[#8C7E6A]" />
                        </motion.div>
                    </section>

                    <CalendarSection />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
