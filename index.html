<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приглашение: Николай и Анастасия</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Infant:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { margin: 0; padding: 0; background-color: #F9F6F0; scroll-behavior: smooth; overflow-x: hidden; color: #2C2C2C; }
        .font-serif { font-family: 'Cormorant Infant', serif; }
        .font-sans { font-family: 'Montserrat', sans-serif; }
        .overlay-gradient {
            background: linear-gradient(to bottom, rgba(249, 246, 240, 0.1) 0%, rgba(249, 246, 240, 0.4) 60%, rgba(249, 246, 240, 1) 100%);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { motion } = window.Motion;

        // Функция-хелпер для генерации прямой ссылки из Google Drive
        const getDirectLink = (id) => `https://lh3.googleusercontent.com/u/0/d/${id}`;

        const CountdownTimer = ({ targetDate }) => {
            const [timeLeft, setTimeLeft] = React.useState({ days: 0, hours: 0, minutes: 0, seconds: 0 });

            React.useEffect(() => {
                const interval = setInterval(() => {
                    const now = new Date().getTime();
                    const distance = new Date(targetDate).getTime() - now;
                    if (distance < 0) { clearInterval(interval); return; }
                    setTimeLeft({
                        days: Math.floor(distance / (1000 * 60 * 60 * 24)),
                        hours: Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)),
                        minutes: Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)),
                        seconds: Math.floor((distance % (1000 * 60)) / 1000)
                    });
                }, 1000);
                return () => clearInterval(interval);
            }, [targetDate]);

            return (
                <div className="flex justify-center items-center py-12 border-t border-[#EAE2D6] mt-10">
                    {[
                        {v: timeLeft.days, l: 'дней'},
                        {v: timeLeft.hours, l: 'часов'},
                        {v: timeLeft.minutes, l: 'минут'},
                        {v: timeLeft.seconds, l: 'секунд'}
                    ].map((item, i) => (
                        <React.Fragment key={i}>
                            <div className="flex flex-col items-center mx-4">
                                <span className="text-3xl font-serif">{item.v}</span>
                                <span className="text-[9px] uppercase tracking-widest text-[#8C7E6A]">{item.l}</span>
                            </div>
                            {i < 3 && <div className="w-[1px] h-8 bg-[#EAE2D6]" />}
                        </React.Fragment>
                    ))}
                </div>
            );
        };

        const ScheduleItem = ({ time, title, location, mapLink }) => (
            <div className="relative pl-8 pb-10 border-l border-[#8C7E6A]/30 last:pb-0">
                <div className="absolute left-[-5px] top-0 w-[9px] h-[9px] rounded-full bg-[#8C7E6A]" />
                <span className="text-[10px] font-sans tracking-widest text-[#8C7E6A] uppercase">{time}</span>
                <h3 className="font-serif text-2xl my-1">{title}</h3>
                <p className="font-sans text-xs text-[#6B5E4C] mb-3 leading-relaxed">{location}</p>
                <a href={mapLink} target="_blank" className="text-[10px] uppercase border-b border-[#8C7E6A] pb-0.5 tracking-tighter">Карта</a>
            </div>
        );

        function App() {
            // ID ваших файлов из ссылок
            const heroId = "1UKkIjvRcpwiEMMLd2YnqPMmFhbKUNVy_";
            const paletteId = "1GpxIpHHytKv2W-l3gf37ddrf5wZvlpEu";

            return (
                <div className="bg-[#F9F6F0]">
                    {/* HERO SECTION */}
                    <section className="relative h-screen flex items-center justify-center overflow-hidden">
                        <div className="absolute inset-0">
                            <div className="absolute inset-0 z-10 overlay-gradient" />
                            <img 
                                src={getDirectLink(heroId)} 
                                className="w-full h-full object-cover" 
                                alt="Николай и Анастасия"
                                onError={(e) => { e.target.src = "https://images.unsplash.com/photo-1519741497674-611481863552?w=1600"; }}
                            />
                        </div>
                        <div className="relative z-20 text-center px-6">
                            <p className="font-sans uppercase tracking-[0.6em] text-[10px] text-[#6B5E4C] mb-6">Приглашение на свадьбу</p>
                            <h1 className="font-serif text-6xl md:text-8xl mb-4">Николай <br/><span className="italic text-[#8C7E6A] text-4xl md:text-5xl">и</span> <br/>Анастасия</h1>
                            <p className="font-sans text-lg tracking-[0.4em] font-light uppercase">20.06.2026</p>
                        </div>
                    </section>

                    {/* ПЛАН ДНЯ */}
                    <section className="py-20 px-6 max-w-5xl mx-auto grid md:grid-cols-2 gap-12">
                        <div>
                            <h2 className="font-serif text-4xl mb-10">План дня</h2>
                            <ScheduleItem time="15:30" title="Сбор гостей" location="ЗАГС №1. Английская наб., 28" mapLink="https://yandex.ru/maps/-/CPV-4855" />
                            <ScheduleItem time="16:00" title="Роспись" location="ЗАГС №1. Английская наб., 28" mapLink="https://yandex.ru/maps/-/CPV-4855" />
                            <ScheduleItem time="17:00 — 23:59" title="Банкет" location="Резиденция К-5. Наб. реки Крестовки, 2" mapLink="https://yandex.ru/maps/-/CPV-aA7S" />
                        </div>
                        <div className="bg-white p-8 rounded shadow-sm border border-[#EAE2D6]">
                            <h3 className="font-serif text-2xl text-center mb-6">Июнь 2026</h3>
                            <div className="grid grid-cols-7 gap-2 text-center text-[10px] text-[#8C7E6A]">
                                {['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].map(d=><div key={d} className="mb-2">{d}</div>)}
                                {Array.from({length:30}, (_,i)=>i+1).map(date=>(
                                    <div key={date} className="relative py-2">
                                        {date===20 && <div className="absolute inset-0 border border-[#8C7E6A] rounded-full scale-75" />}
                                        <span className={date===20 ? "text-black font-bold" : "opacity-40"}>{date}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* ДРЕСС-КОД */}
                    <section className="py-20 px-6 text-center bg-white">
                        <div className="max-w-2xl mx-auto">
                            <h2 className="font-serif text-4xl mb-6">Dress Code</h2>
                            <p className="font-sans text-xs tracking-widest text-[#8C7E6A] mb-8 uppercase italic">Cocktail</p>
                            <p className="font-sans font-light leading-loose text-sm mb-12">
                                Мы будем благодарны, если вы поддержите стиль нашего вечера. Пастельные и приглушённые оттенки, избегая ярких цветов и белого.
                            </p>
                            <img 
                                src={getDirectLink(paletteId)} 
                                className="w-full max-w-md mx-auto rounded shadow-lg" 
                                alt="Палитра"
                                onError={(e) => { e.target.src = "https://images.unsplash.com/photo-1517048676732-d65bc937f952?w=800"; }}
                            />
                        </div>
                    </section>

                    {/* КОНТАКТЫ И ТАЙМЕР */}
                    <section className="py-20 px-6 text-center">
                        <h2 className="font-serif text-4xl mb-6">Ждем вас!</h2>
                        <p className="font-sans text-xs uppercase tracking-widest mb-10">До 20 мая сообщите нам о присутствии</p>
                        <div className="flex flex-col md:flex-row justify-center gap-6 mb-10">
                            <a href="tel:+79112783862" className="p-4 bg-white border border-[#EAE2D6] font-serif text-xl">Анастасия</a>
                            <a href="tel:+79020445244" className="p-4 bg-white border border-[#EAE2D6] font-serif text-xl">Николай</a>
                        </div>
                        <CountdownTimer targetDate="2026-06-20T15:30:00" />
                    </section>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
