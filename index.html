<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приглашение: Николай & Анастасия</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Infant:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { margin: 0; padding: 0; background-color: #F9F6F0; scroll-behavior: smooth; overflow-x: hidden; color: #2C2C2C; }
        .font-serif { font-family: 'Cormorant Infant', serif; }
        .font-sans { font-family: 'Montserrat', sans-serif; }
        .overlay-gradient {
            background: linear-gradient(to bottom, rgba(249, 246, 240, 0.1) 0%, rgba(249, 246, 240, 0.3) 50%, rgba(249, 246, 240, 0.7) 100%);
        }
        .text-backdrop {
            background: rgba(249, 246, 240, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 2.5rem;
            padding: 3rem 1.5rem;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { motion } = window.Motion;

        const getDirectLink = (id) => `https://lh3.googleusercontent.com/u/0/d/${id}`;

        const containerVariants = {
            hidden: { opacity: 0 },
            visible: {
                opacity: 1,
                transition: { staggerChildren: 0.6, delayChildren: 0.4 }
            }
        };

        const itemVariants = {
            hidden: { opacity: 0, y: 30, filter: 'blur(10px)' },
            visible: { 
                opacity: 1, y: 0, filter: 'blur(0px)',
                transition: { duration: 1.8, ease: [0.16, 1, 0.3, 1] } 
            }
        };

        const CountdownTimer = ({ targetDate }) => {
            const [timeLeft, setTimeLeft] = React.useState({ days: 0, hours: 0, minutes: 0, seconds: 0 });

            React.useEffect(() => {
                const interval = setInterval(() => {
                    const now = new Date().getTime();
                    const distance = new Date(targetDate).getTime() - now;
                    if (distance < 0) { clearInterval(interval); return; }
                    setTimeLeft({
                        days: Math.floor(distance / (1000 * 60 * 60 * 24)),
                        hours: Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)),
                        minutes: Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)),
                        seconds: Math.floor((distance % (1000 * 60)) / 1000)
                    });
                }, 1000);
                return () => clearInterval(interval);
            }, [targetDate]);

            return (
                <div className="flex justify-center items-center py-10 border-t border-[#EAE2D6] mt-10">
                    {[{v: timeLeft.days, l: 'дней'}, {v: timeLeft.hours, l: 'часов'}, {v: timeLeft.minutes, l: 'минут'}, {v: timeLeft.seconds, l: 'секунд'}].map((item, i) => (
                        <React.Fragment key={i}>
                            <div className="flex flex-col items-center mx-2 md:mx-6">
                                <span className="text-2xl md:text-4xl font-serif">{item.v}</span>
                                <span className="text-[8px] md:text-[10px] uppercase tracking-widest text-[#8C7E6A] mt-1">{item.l}</span>
                            </div>
                            {i < 3 && <div className="w-[1px] h-8 bg-[#EAE2D6]" />}
                        </React.Fragment>
                    ))}
                </div>
            );
        };

        const ScheduleItem = ({ time, title, location, address, mapLink }) => (
            <motion.div 
                initial={{ opacity: 0, x: -20 }}
                whileInView={{ opacity: 1, x: 0 }}
                viewport={{ once: true }}
                transition={{ duration: 1 }}
                className="relative pl-8 pb-10 border-l border-[#8C7E6A]/30 last:pb-0"
            >
                <div className="absolute left-[-5px] top-0 w-[9px] h-[9px] rounded-full bg-[#8C7E6A]" />
                <span className="text-xs font-sans tracking-widest text-[#8C7E6A] uppercase">{time}</span>
                <h3 className="font-serif text-2xl md:text-3xl my-2 text-[#1A1A1A]">{title}</h3>
                <div className="font-sans text-sm text-[#6B5E4C] font-light leading-relaxed mb-4">
                    <p className="font-medium">{location}</p>
                    <p className="opacity-80 text-xs">{address}</p>
                </div>
                <a href={mapLink} target="_blank" className="inline-block text-[10px] uppercase tracking-[0.2em] text-[#8C7E6A] border-b border-[#8C7E6A] pb-1">Посмотреть карту</a>
            </motion.div>
        );

        function App() {
            const heroId = "1UKkIjvRcpwiEMMLd2YnqPMmFhbKUNVy_";
            const paletteId = "1GpxIpHHytKv2W-l3gf37ddrf5wZvlpEu";

            return (
                <div className="bg-[#F9F6F0] w-full overflow-x-hidden">
                    {/* HERO */}
                    <section className="relative h-screen min-h-[600px] flex items-center justify-center overflow-hidden px-4">
                        <motion.div initial={{ scale: 1.1 }} animate={{ scale: 1 }} transition={{ duration: 15 }} className="absolute inset-0 z-0">
                            <div className="absolute inset-0 z-10 overlay-gradient" />
                            <img 
                                src={getDirectLink(heroId)} 
                                className="w-full h-full object-cover" 
                                alt="Николай & Анастасия"
                                onError={(e) => { e.target.src = "https://images.unsplash.com/photo-1511795409834-ef04bbd61622?q=80&w=2000"; }}
                            />
                        </motion.div>
                        
                        <motion.div 
                            variants={containerVariants}
                            initial="hidden"
                            animate="visible"
                            className="relative z-20 text-center w-full max-w-lg text-backdrop"
                        >
                            {/* Строка Save the Date удалена по запросу */}
                            
                            <div className="flex flex-col items-center mb-6 md:mb-10">
                                <motion.h1 variants={itemVariants} className="font-serif text-5xl md:text-8xl text-[#1A1A1A] font-light tracking-tight leading-tight">Николай</motion.h1>
                                <motion.div variants={itemVariants} className="my-2">
                                    <span className="font-serif text-3xl md:text-5xl italic text-[#8C7E6A]">&</span>
                                </motion.div>
                                <motion.h1 variants={itemVariants} className="font-serif text-5xl md:text-8xl text-[#1A1A1A] font-light tracking-tight leading-tight">Анастасия</motion.h1>
                            </div>

                            <motion.div variants={itemVariants} className="flex flex-col items-center">
                                <div className="w-12 h-[1px] bg-[#8C7E6A] mb-6 md:mb-8 opacity-40" />
                                <p className="font-sans text-[#2D2D2D] text-lg md:text-2xl tracking-[0.4em] font-extralight uppercase">20.06.2026</p>
                            </motion.div>
                        </motion.div>
                    </section>

                    {/* ПЛАН ДНЯ */}
                    <section className="py-16 md:py-24 px-6 md:px-20">
                        <div className="max-w-5xl mx-auto grid lg:grid-cols-2 gap-12 md:gap-16">
                            <div>
                                <h2 className="font-serif text-4xl md:text-6xl text-[#1A1A1A] mb-10 md:mb-12 text-center lg:text-left">План дня</h2>
                                <div className="max-w-md mx-auto lg:mx-0">
                                    <ScheduleItem time="15:30" title="Сбор гостей" location="ЗАГС №1" address="Английская наб., 28, Санкт-Петербург" mapLink="https://yandex.ru/maps/-/CPV-4855" />
                                    <ScheduleItem time="16:00" title="Роспись" location="ЗАГС №1" address="Английская наб., 28, Санкт-Петербург" mapLink="https://yandex.ru/maps/-/CPV-4855" />
                                    <ScheduleItem time="17:00 — 23:59" title="Банкет" location="Резиденция К-5" address="Наб. реки Крестовки, 2, Санкт-Петербург" mapLink="https://yandex.ru/maps/-/CPV-aA7S" />
                                </div>
                            </div>
                            
                            <div className="bg-white p-6 md:p-10 rounded-2xl shadow-sm border border-[#EAE2D6] self-start max-w-sm mx-auto w-full lg:max-w-none">
                                <h3 className="font-serif text-2xl md:text-3xl text-center mb-6 md:mb-8 font-light tracking-wide">Июнь 2026</h3>
                                <div className="grid grid-cols-7 gap-y-4 text-center text-[10px] font-sans tracking-widest text-[#8C7E6A]">
                                    {['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].map(d=><div key={d} className="opacity-60">{d}</div>)}
                                    {Array.from({length:30}, (_,i)=>i+1).map(date=>(
                                        <div key={date} className="relative py-2 flex items-center justify-center text-xs md:text-sm">
                                            {date===20 && <div className="absolute w-7 h-7 md:w-8 md:h-8 border border-[#8C7E6A] rounded-full scale-110" />}
                                            <span className={date===20 ? "text-black font-normal" : "opacity-30"}>{date}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* ДРЕСС-КОД */}
                    <section className="py-16 md:py-24 px-6 bg-white">
                        <div className="max-w-3xl mx-auto text-center">
                            <h2 className="font-serif text-4xl md:text-5xl text-[#1A1A1A] mb-6">Dress Code</h2>
                            <p className="font-sans font-light tracking-[0.1em] text-[#6B5E4C] mb-10 md:mb-12 uppercase text-xs italic">Cocktail</p>
                            <p className="font-sans font-light leading-relaxed text-[#4A4A4A] mb-12 md:mb-16 text-sm md:text-base px-4">
                                Мы будем благодарны, если вы поддержите стиль нашего вечера. <br className="hidden md:block"/>
                                Отдавайте предпочтение <span className="font-medium italic text-[#8C7E6A]">пастельным оттенкам</span> <br className="hidden md:block"/>
                                и избегайте ярких цветов и белого (для девушек).
                            </p>
                            <img src={getDirectLink(paletteId)} className="w-full max-w-xl mx-auto rounded-xl shadow-sm" alt="Вдохновение" onError={(e) => { e.target.src = "https://images.unsplash.com/photo-1517048676732-d65bc937f952?q=80&w=2000"; }} />
                        </div>
                    </section>

                    {/* ПОДТВЕРЖДЕНИЕ */}
                    <section className="py-16 md:py-24 px-6 text-center bg-[#F9F6F0]">
                        <div className="max-w-2xl mx-auto px-4">
                            <h2 className="font-serif text-4xl md:text-5xl text-[#1A1A1A] mb-6 md:mb-8">Подтверждение</h2>
                            <p className="font-serif italic text-xl md:text-2xl text-[#8C7E6A] mb-4 md:mb-6 leading-tight">Ждем встречи с вами!</p>
                            <p className="font-sans font-light tracking-widest text-[9px] md:text-[10px] mb-10 md:mb-12 uppercase">Сообщите о присутствии до 20 мая</p>
                            
                            <div className="grid md:grid-cols-2 gap-4 md:gap-8 mb-16">
                                <div className="p-6 md:p-8 bg-white border border-[#EAE2D6] rounded-2xl">
                                    <p className="font-sans text-[9px] uppercase tracking-[0.3em] text-[#8C7E6A] mb-3 opacity-70">Невеста</p>
                                    <p className="font-serif text-xl md:text-2xl mb-2">Анастасия</p>
                                    <a href="tel:+79112783862" className="font-sans text-xs tracking-tighter text-[#2C2C2C]">+7 (911) 278-38-62</a>
                                </div>
                                <div className="p-6 md:p-8 bg-white border border-[#EAE2D6] rounded-2xl">
                                    <p className="font-sans text-[9px] uppercase tracking-[0.3em] text-[#8C7E6A] mb-3 opacity-70">Жених</p>
                                    <p className="font-serif text-xl md:text-2xl mb-2">Николай</p>
                                    <a href="tel:+79020445244" className="font-sans text-xs tracking-tighter text-[#2C2C2C]">+7 (902) 044-52-44</a>
                                </div>
                            </div>

                            <CountdownTimer targetDate="2026-06-20T15:30:00" />
                        </div>
                    </section>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
